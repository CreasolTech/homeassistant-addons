name: Clean up old container package versions

on:
  workflow_dispatch:  # Trigger manually
  schedule:
    - cron: '0 2 * * 0'  # Run weekly on Sunday at 2 AM UTC

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    strategy:
      matrix:
        package:
          - i386-dombusgateway-addon
          - amd64-dombusgateway-addon
          - armv7-dombusgateway-addon
          - armhf-dombusgateway-addon
          - aarch64-dombusgateway-addon

    steps:
      - name: Delete old versions for ${{ matrix.package }}
        uses: actions/delete-package-versions@v4
        with:
          package-name: homeassistant-addons/${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 1
          # ignore-versionless-assets: true
          token: ${{ secrets.GITHUB_TOKEN }}



